<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Good Night 🕙</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: linear-gradient(135deg, #db4bbb, #9e51ab, #9432a5, #88108f);
        background-size: 400% 400%;
        animation: backgroundBlink 6s infinite;
        overflow: hidden;
        font-family: Arial, sans-serif;
        flex-direction: column;
        background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSMmDi_vFp7tHRaCeDcyXFnH8EeU2PwlblqNg&s");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
background-attachment: fixed;
        
      }

      @keyframes backgroundBlink {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      h1 {
        color: rgb(240, 9, 59);
        font-size: 3em;
        text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        text-align: center;
        padding: 0 20px;
        min-height: 1.5em;
      }

      .slide-in {
        animation: slideIn 1s ease forwards;
      }

      @keyframes slideIn {
        0% {
          opacity: 0;
          transform: translateY(50px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-out {
        animation: fadeOut 0.6s ease forwards;
      }

      @keyframes fadeOut {
        from { opacity: 1; }
        to { opacity: 0; }
      }

      .music-control {
        margin-top: 20px;
        padding: 10px 20px;
        background: rgba(255, 255, 255, 0.3);
        color: #fff;
        font-size: 1.2em;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.5s ease, transform 0.3s ease;
      }

      .music-control:hover {
        background: rgba(255, 255, 255, 0.5);
        transform: scale(1.05);
      }
      .video-box {
  margin-top: 20px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(255,255,255,0.5);
}
    </style>
  </head>
  <body>

    <h1 id="wishText"></h1>
    <div class="signature" style="font-size: 30px;">_trquang05_</div>


    <div class="music-control" onclick="toggleMusic()">🎵 Bật/Tắt Nhạc</div>
<div class="music-control" onclick="openYoutube()">
  👉Xem trên yt thì bấm vào đây nè cậu:))👈
</div>
<div class="video-box">
  <iframe
    width="320"
    height="180"
    src="https://www.youtube.com/embed/IX9eEYXtHCE"
    title="YouTube video"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>


    <audio id="bgMusic" loop>
      <source
        src="hihi.mp3"
        type="audio/mp3"
      />
    </audio>

    <script>
      const music = document.getElementById("bgMusic");
      const wishElement = document.getElementById("wishText");
      let isPlaying = false;
      let isFirstLoad = true;

      const wishes = [
        "Ngủ ngon nhé, mai còn dậy sớm đó 😌",
        "Cậu ngủ nha, nay đi làm mệt rồi nè",
        "Chúc cậu mơ đẹp mai kể tớ nghe đó 😆" ,
        "Đêm nay ngủ thật ngon nhé 🌙",
        "Nhắm mắt lại nào, mai còn nhiều chuyện để nói lắm đó 🌻",
        "Ngủ ngoan nha, mai dậy sớm để thành công nhé hehe 😁",
        "Chúc cậu một giấc ngủ thật sâu nnh ✨",
        "Ngủ đi cậu ơi, tớ đợi sáng mai cậu chào buổi sáng đó😊",
        "Thoi ngủ đi cậu, tớ cũng chuẩn bị ngủ đây 💤"
      ];
      function typeWriter(text, speed = 80) {
        wishElement.innerHTML = "";
        const words = text.split(" ");
        let index = 0;

        const interval = setInterval(() => {
          wishElement.innerHTML += words[index] + " ";
          index++;
          if (index >= words.length) {
            clearInterval(interval);
          }
        }, speed);
      }

      function showRandomWish() {
        const randomIndex = Math.floor(Math.random() * wishes.length);
        const newText = wishes[randomIndex];

        if (isFirstLoad) {
          typeWriter(newText, 150);
          isFirstLoad = false;
        } else {
          wishElement.classList.remove("slide-in");
          wishElement.classList.add("fade-out");

          setTimeout(() => {
            wishElement.innerText = newText;
            wishElement.classList.remove("fade-out");
            void wishElement.offsetWidth;
            wishElement.classList.add("slide-in");
          }, 500);
        }
      }

      window.onload = function () {
        showRandomWish();
        setInterval(showRandomWish, 5000);
      };

      function toggleMusic() {
        if (isPlaying) {
          music.pause();
          isPlaying = false;
        } else {
          music.play();
          isPlaying = true;
        }
      }

      music.onerror = () => {
        alert("Không thể phát nhạc. Vui lòng kiểm tra đường dẫn hoặc file nhạc.");
      };
      function openYoutube() {
  window.open(
    "https://www.youtube.com/embed/IX9eEYXtHCE",
    "_blank"
  );
}
    </script>

  </body>
</html>
